<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>


<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">EduPlatform</h1>
        </nav>
    </header>

    <main>
    <section class="auth-container">

        <article class="auth-card">
            <h2>Login</h2>

            <form id="registerForm">

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" placeholder="Phone Number">
                </div>

                <!-- Age -->
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="Age">
                </div>

                <!-- Major -->
                <div class="form-group">
                    <label for="major">Major</label>
                    <input type="text" id="major" name="major" placeholder="Major">
                </div>

                <!-- Skills -->
                <div class="form-group">
                    <label>Select Your Skills</label>

                    <div class="skills-grid">
                        <label><input type="checkbox" name="skills" value="1">Programming</label>
                        <label><input type="checkbox" name="skills" value="2">Design</label>
                        <label><input type="checkbox" name="skills" value="3">Marketing</label>
                        <label><input type="checkbox" name="skills" value="4">Writing</label>
                        <label><input type="checkbox" name="skills" value="5">Data Analysis</label>
                        <label><input type="checkbox" name="skills" value="6">Project Management</label>
                    </div>
                </div>

                <!-- Button -->
                <div class="form-group">
                    <button type="submit" class="btn-primary">Register</button>
                </div>

            </form>

            <div class="auth-links">
                <a href="#">Forgot Password?</a>
                <p>
                    Already have an account?
                    <a href="{{ url_for('login_page') }}">Login</a>
                </p>
            </div>

        </article>

    </section>
</main>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

</body>

</html>
